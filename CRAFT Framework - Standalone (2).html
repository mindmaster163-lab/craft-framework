    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +

    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    // preserve ordering (React before ReactDOM before Babel before text/babel).

;\n  font-size: 24px;\n}\n\n.btn-restart {\n  padding: 9px 22px;\n  background: transparent;\n  border: 1px solid rgba(255,255,255,.15);\n  border-radius: 8px;\n  font-size: 12px;\n  font-family: inherit;\n  color: rgba(255,255,255,.35);\n  cursor: pointer;\n  transition: border-color .2s, color .2s;\n}\n.btn-restart:hover {\n  border-color: rgba(255,255,255,.35);\n  color: rgba(255,255,255,.7);\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- ══ INTRO ══ -->\n<div id=\"stage-intro\" class=\"stage visible\">\n  <div style=\"display:flex; flex-direction:column; align-items:center; gap:0; width:100%;\">\n    <div class=\"intro-body\">\n      <div class=\"intro-eyebrow\">MODELUL<\u002Fdiv>\n      <div class=\"intro-title\">\n        <div class=\"intro-letters\" id=\"intro-letters\">\n          <span class=\"intro-letter\" style=\"color:var(--c-col)\">C<\u002Fspan><span class=\"intro-letter\" style=\"color:var(--r-col)\">R<\u002Fspan><span class=\"intro-letter\" style=\"color:var(--a-col)\">A<\u002Fspan><span class=\"intro-letter\" style=\"color:var(--f-col)\">F<\u002Fspan><span class=\"intro-letter\" style=\"color:var(--t-col)\">T<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"intro-sub\" id=\"intro-sub\">Cum arata un prompt bun?<\u002Fp>\n      <div class=\"intro-cta\" id=\"intro-cta\">\n        <button class=\"btn-n\" id=\"btn-start\" style=\"padding:10px 28px; font-size:14px;\">Incepe →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"intro-prompt-strip\" id=\"intro-strip\">\n      <span class=\"istrip-seg\" id=\"is0\">Banca noastra tocmai a actualizat politica AML, un document de 42 de pagini.<\u002Fspan>\n      <span> <\u002Fspan>\n      <span class=\"istrip-seg\" id=\"is1\">Esti un specialist in comunicare clara care traduce documente de reglementare pentru angajati fara pregatire juridica.<\u002Fspan>\n      <span> <\u002Fspan>\n      <span class=\"istrip-seg\" id=\"is2\">Rezuma principalele obligatii si schimbari pe care personalul de la ghiseu trebuie sa le cunoasca.<\u002Fspan>\n      <span> <\u002Fspan>\n      <span class=\"istrip-seg\" id=\"is3\">Formateaza raspunsul ca o lista de puncte cu un titlu bold pentru fiecare sectiune, pe o singura pagina.<\u002Fspan>\n      <span> <\u002Fspan>\n      <span class=\"istrip-seg\" id=\"is4\">Foloseste un ton clar si direct, fara jargon, accesibil oricarui angajat.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ CRAFT ══ -->\n<div id=\"stage-craft\" class=\"stage\">\n  <div class=\"craft-wrap\">\n    <div class=\"craft-header\">\n      <div class=\"craft-pills\" id=\"cpills\">\n        <div class=\"cpill\">C<\u002Fdiv>\n        <div class=\"cpill\">R<\u002Fdiv>\n        <div class=\"cpill\">A<\u002Fdiv>\n        <div class=\"cpill\">F<\u002Fdiv>\n        <div class=\"cpill\">T<\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"craft-header-label\">Anatomia promptului<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"craft-prompt\" id=\"craft-prompt\"><\u002Fdiv>\n    <div class=\"craft-panel\">\n      <div class=\"panel-accent\" id=\"panel-accent\"><\u002Fdiv>\n      <div class=\"panel-letter\" id=\"panel-letter\">C<\u002Fdiv>\n      <div class=\"panel-word\" id=\"panel-word\"><\u002Fdiv>\n      <div class=\"panel-desc\" id=\"panel-desc\"><\u002Fdiv>\n      <div class=\"panel-quote\" id=\"panel-quote\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"craft-controls\" id=\"craft-ctrl\">\n    <button class=\"btn-s\" id=\"btn-skip\">Sari la final<\u002Fbutton>\n    <div class=\"track\"><div class=\"track-fill\" id=\"track-fill\"><\u002Fdiv><\u002Fdiv>\n    <span class=\"step-label\" id=\"step-lbl\">1 / 5<\u002Fspan>\n    <button class=\"btn-n\" id=\"btn-next\">Urmator →<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ END ══ -->\n<div id=\"stage-end\" class=\"stage\">\n  <div class=\"end-wrap\">\n    <p class=\"end-label\">Promptul complet<\u002Fp>\n    <div class=\"end-prompt\" id=\"end-prompt\"><\u002Fdiv>\n    <div class=\"end-legend\">\n      <div class=\"leg\"><div class=\"leg-pip\" style=\"background:var(--c-col)\"><\u002Fdiv> Context<\u002Fdiv>\n      <div class=\"leg\"><div class=\"leg-pip\" style=\"background:var(--r-col)\"><\u002Fdiv> Rol<\u002Fdiv>\n      <div class=\"leg\"><div class=\"leg-pip\" style=\"background:var(--a-col)\"><\u002Fdiv> Actiune<\u002Fdiv>\n      <div class=\"leg\"><div class=\"leg-pip\" style=\"background:var(--f-col)\"><\u002Fdiv> Format<\u002Fdiv>\n      <div class=\"leg\"><div class=\"leg-pip\" style=\"background:var(--t-col)\"><\u002Fdiv> Ton<\u002Fdiv>\n    <\u002Fdiv>\n    \n    <button class=\"btn-restart\" id=\"btn-restart\">↺ Reia de la inceput<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst PARTS = [\n  {\n    key: 'C', word: 'Context', idx: 0,\n    color: 'var(--c-col)', bg: 'var(--c-bg)', hex: '#2870ed',\n    text: 'Banca noastra tocmai a actualizat politica AML, un document de 42 de pagini.',\n    desc: 'Stabileste cadrul. Ofera modelului contextul de care are nevoie inainte de orice altceva.',\n    quote: '\"Banca noastra tocmai a actualizat politica AML, un document de 42 de pagini.\"'\n  },\n  {\n    key: 'R', word: 'Rol', idx: 1,\n    color: 'var(--r-col)', bg: 'var(--r-bg)', hex: '#721c7a',\n    text: 'Esti un specialist in comunicare clara care traduce documente de reglementare pentru angajati fara pregatire juridica.',\n    // no AI name\n    desc: 'Atribuie un rol. Persona modeleaza expertiza, vocabularul si tonul de autoritate al raspunsului.',\n    quote: '\"Esti un specialist in comunicare clara care traduce documente de reglementare pentru angajati fara pregatire juridica.\"',\n    _note: 'rol'\n  },\n  {\n    key: 'A', word: 'Actiune', idx: 2,\n    color: 'var(--a-col)', bg: 'var(--a-bg)', hex: '#ff6130',\n    text: 'Rezuma principalele obligatii si schimbari pe care personalul de la ghiseu trebuie sa le cunoasca.',\n    desc: 'Spune exact ce vrei. Aceasta este sarcina concreta: verbul principal al promptului.',\n    quote: '\"Rezuma principalele obligatii si schimbari pe care personalul de la ghiseu trebuie sa le cunoasca.\"'\n  },\n  {\n    key: 'F', word: 'Format', idx: 3,\n    color: 'var(--f-col)', bg: 'var(--f-bg)', hex: '#028661',\n    text: 'Formateaza raspunsul ca o lista de puncte cu un titlu bold pentru fiecare sectiune, pe o singura pagina.',\n    desc: 'Specifica structura. Formatul decide daca rezultatul poate fi folosit direct sau trebuie rescris.',\n    quote: '\"Formateaza raspunsul ca o lista de puncte cu un titlu bold pentru fiecare sectiune, pe o singura pagina.\"'\n  },\n  {\n    key: 'T', word: 'Ton', idx: 4,\n    color: 'var(--t-col)', bg: 'var(--t-bg)', hex: '#02a3a4',\n    text: 'Foloseste un ton clar si direct, fara jargon, accesibil oricarui angajat.',\n    desc: 'Defineste vocea. Tonul calibreaza registrul emotional si nivelul de lectura al publicului.',\n    quote: '\"Foloseste un ton clar si direct, fara jargon, accesibil oricarui angajat.\"'\n  }\n];\n\nconst AUTO_MS = 4500;\nlet step = 0;\nlet raf = null;\nlet rafStart = null;\n\n// Elements\nconst stgIntro  = document.getElementById('stage-intro');\nconst stgCraft  = document.getElementById('stage-craft');\nconst stgEnd    = document.getElementById('stage-end');\nconst craftCtrl = document.getElementById('craft-ctrl');\nconst trackFill = document.getElementById('track-fill');\nconst stepLbl   = document.getElementById('step-lbl');\nconst btnNext   = document.getElementById('btn-next');\nconst btnSkip   = document.getElementById('btn-skip');\nconst btnStart  = document.getElementById('btn-start');\nconst btnRestart= document.getElementById('btn-restart');\nconst cpills    = document.querySelectorAll('.cpill');\nconst craftPr   = document.getElementById('craft-prompt');\nconst panelAcc  = document.getElementById('panel-accent');\nconst panelLtr  = document.getElementById('panel-letter');\nconst panelWrd  = document.getElementById('panel-word');\nconst panelDesc = document.getElementById('panel-desc');\nconst panelQuote= document.getElementById('panel-quote');\nconst endPrompt = document.getElementById('end-prompt');\n\n// ── Intro animation ──\nfunction animateIntro() {\n  const letters = document.querySelectorAll('.intro-letter');\n  letters.forEach((el, i) => {\n    setTimeout(() => {\n      el.style.opacity = '1';\n      el.style.transform = 'none';\n    }, 200 + i * 80);\n  });\n  setTimeout(() => {\n    document.getElementById('intro-sub').classList.add('show');\n    document.getElementById('intro-cta').classList.add('show');\n  }, 650);\n  setTimeout(() => {\n    document.getElementById('intro-strip').classList.add('show');\n    // Light up strip segments with delay\n    PARTS.forEach((p, i) => {\n      setTimeout(() => {\n        const el = document.getElementById('is' + i);\n        if (el) el.style.color = p.hex;\n      }, 200 + i * 130);\n    });\n  }, 1100);\n}\n\n// ── Build craft prompt ──\nfunction buildCraftPrompt() {\n  craftPr.innerHTML = '';\n  PARTS.forEach((p, i) => {\n    const span = document.createElement('span');\n    span.className = 'ps';\n    span.id = 'cps-' + i;\n    span.textContent = p.text;\n    craftPr.appendChild(span);\n    if (i < PARTS.length - 1) craftPr.appendChild(document.createTextNode(' '));\n  });\n}\n\nfunction highlightStep(idx) {\n  PARTS.forEach((_, i) => {\n    const el = document.getElementById('cps-' + i);\n    if (!el) return;\n    el.className = 'ps';\n    el.style.backgroundColor = '';\n    el.style.color = '';\n    if (i === idx) {\n      el.classList.add('lit');\n      el.style.backgroundColor = PARTS[i].bg;\n    } else {\n      el.classList.add('dim');\n    }\n  });\n}\n\nfunction updatePanel(idx) {\n  const p = PARTS[idx];\n  panelAcc.style.background = p.color;\n  panelLtr.style.color = p.color;\n  panelLtr.textContent = p.key;\n  panelWrd.textContent = p.word;\n  panelDesc.textContent = p.desc;\n  panelQuote.textContent = p.quote;\n  panelQuote.style.backgroundColor = p.bg;\n\n  cpills.forEach((pill, i) => {\n    pill.className = 'cpill';\n    pill.style.background = '';\n    pill.style.color = '';\n    if (i === idx) {\n      pill.classList.add('active');\n      pill.style.background = p.hex;\n    } else if (i < idx) {\n      pill.classList.add('done');\n    }\n  });\n\n  stepLbl.textContent = (idx + 1) + ' / 5';\n  trackFill.style.background = p.color;\n  btnNext.textContent = idx < 4 ? 'Urmator →' : 'Vezi rezumatul →';\n}\n\n// ── Auto-advance ──\nfunction startAuto() {\n  stopAuto();\n  trackFill.style.width = '0%';\n  rafStart = performance.now();\n  function tick(now) {\n    const pct = Math.min(100, ((now - rafStart) / AUTO_MS) * 100);\n    trackFill.style.width = pct + '%';\n    if (pct >= 100) { advance(); }\n    else { raf = requestAnimationFrame(tick); }\n  }\n  raf = requestAnimationFrame(tick);\n}\n\nfunction stopAuto() {\n  if (raf) { cancelAnimationFrame(raf); raf = null; }\n}\n\nfunction advance() {\n  stopAuto();\n  step++;\n  if (step >= PARTS.length) { toEnd(); }\n  else { highlightStep(step); updatePanel(step); startAuto(); }\n}\n\n// ── Transitions ──\nfunction toCraft() {\n  buildCraftPrompt();\n  step = 0;\n  highlightStep(0);\n  updatePanel(0);\n  stgIntro.classList.remove('visible');\n  setTimeout(() => {\n    stgCraft.classList.add('visible');\n    setTimeout(() => {\n      craftCtrl.classList.add('visible');\n      startAuto();\n    }, 300);\n  }, 500);\n}\n\nfunction toEnd() {\n  buildEnd();\n  stgCraft.classList.remove('visible');\n  craftCtrl.classList.remove('visible');\n  setTimeout(() => stgEnd.classList.add('visible'), 500);\n}\n\nfunction buildEnd() {\n  endPrompt.innerHTML = '';\n  PARTS.forEach((p, i) => {\n    const span = document.createElement('span');\n    span.className = 'eseg eseg-' + p.key.toLowerCase();\n    span.textContent = p.text;\n    endPrompt.appendChild(span);\n    if (i < PARTS.length - 1) endPrompt.appendChild(document.createTextNode(' '));\n  });\n}\n\nfunction restart() {\n  stgEnd.classList.remove('visible');\n  step = 0;\n  stopAuto();\n  setTimeout(() => {\n    stgIntro.classList.add('visible');\n    // Re-trigger intro anim\n    document.querySelectorAll('.intro-letter').forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(12px)';\n    });\n    document.getElementById('intro-sub').classList.remove('show');\n    document.getElementById('intro-cta').classList.remove('show');\n    document.getElementById('intro-strip').classList.remove('show');\n    PARTS.forEach((p, i) => {\n      const el = document.getElementById('is' + i);\n      if (el) el.style.color = '';\n    });\n    setTimeout(animateIntro, 80);\n  }, 500);\n}\n\n// ── Events ──\nbtnStart.addEventListener('click', toCraft);\nbtnNext.addEventListener('click', () => { stopAuto(); advance(); });\nbtnSkip.addEventListener('click', () => { stopAuto(); toEnd(); });\nbtnRestart.addEventListener('click', restart);\n\n// ── Init ──\nanimateIntro();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
